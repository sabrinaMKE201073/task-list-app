<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Task List</title>
  <meta name="description"
    content="A simple, beginner-friendly task list app with categories, priorities, dates, and task status." />
  <!-- Link to our CSS file for styling -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="container">

    <!-- App Header -->
    <h1 class="app-title">📝 My Task List</h1>

    <!-- Input area: type a task, click Add -->
    <div class="input-area">
      <input type="text" id="task-input" placeholder="Add a new task..." />
      <button id="add-btn">Add</button>
    </div>

    <!-- Row 2: Category, Priority, Status, and Date inputs -->
    <div class="options-row">

      <!-- Category dropdown -->
      <div class="option-group">
        <label for="category-select">Category</label>
        <select id="category-select">
          <option value="Work">💼 Work</option>
          <option value="Learning">📚 Learning</option>
          <option value="Personal">🏠 Personal</option>
          <option value="Hobby">🎨 Hobby</option>
        </select>
      </div>

      <!-- Priority dropdown -->
      <div class="option-group">
        <label for="priority-select">Priority</label>
        <select id="priority-select">
          <option value="High">🔴 High</option>
          <option value="Medium" selected>🟡 Medium</option>
          <option value="Low">🟢 Low</option>
        </select>
      </div>

      <!-- Status dropdown -->
      <div class="option-group">
        <label for="status-select">Status</label>
        <select id="status-select">
          <option value="WIP">🔶 WIP</option>
          <option value="Ongoing">🔵 Ongoing</option>
          <option value="Hold">⏸ Hold</option>
          <option value="Done">✅ Done</option>
        </select>
      </div>

      <!-- Date picker -->
      <div class="option-group">
        <label for="date-input">Due Date</label>
        <input type="date" id="date-input" />
      </div>

    </div>

    <!-- Filter Row 1: Filter by Category -->
    <div class="filter-section-label">Filter by Category:</div>
    <div class="filter-bar" id="category-filter-bar">
      <button class="filter-btn active" data-filter-type="category" data-filter="All">All</button>
      <button class="filter-btn" data-filter-type="category" data-filter="Work">💼 Work</button>
      <button class="filter-btn" data-filter-type="category" data-filter="Learning">📚 Learning</button>
      <button class="filter-btn" data-filter-type="category" data-filter="Personal">🏠 Personal</button>
      <button class="filter-btn" data-filter-type="category" data-filter="Hobby">🎨 Hobby</button>
    </div>

    <!-- Filter Row 2: Filter by Status -->
    <div class="filter-section-label">Filter by Status:</div>
    <div class="filter-bar" id="status-filter-bar">
      <button class="filter-btn active" data-filter-type="status" data-filter="All">All</button>
      <button class="filter-btn status-filter-wip"     data-filter-type="status" data-filter="WIP">🔶 WIP</button>
      <button class="filter-btn status-filter-ongoing" data-filter-type="status" data-filter="Ongoing">🔵 Ongoing</button>
      <button class="filter-btn status-filter-hold"    data-filter-type="status" data-filter="Hold">⏸ Hold</button>
      <button class="filter-btn status-filter-done"    data-filter-type="status" data-filter="Done">✅ Done</button>
    </div>

    <!-- Counter showing how many tasks are left -->
    <p class="task-counter" id="task-counter">No tasks yet. Add one above!</p>

    <!-- The list where tasks will appear -->
    <ul id="task-list"></ul>

  </div>

  <!-- Link to our JavaScript file for logic -->
  <script src="script.js"></script>
</body>

</html>
